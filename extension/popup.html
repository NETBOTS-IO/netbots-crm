<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetBots Map Scraper</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="logo">
        <span class="logo-nb">NB</span>
        <span class="logo-text">NetBots <strong>CRM</strong></span>
      </div>
      <span class="version">v1.0</span>
    </div>

    <!-- Auth Section (shown when not logged in) -->
    <div id="auth-section" class="section">
      <div class="section-title">Sign In to CRM</div>
      <div class="form-group">
        <label for="crm-email">Email</label>
        <input type="email" id="crm-email" placeholder="saqlain@netbots.io" />
      </div>
      <div class="form-group">
        <label for="crm-password">Password</label>
        <input type="password" id="crm-password" placeholder="••••••••" />
      </div>
      <button id="btn-login" class="btn btn-primary">Sign In</button>
      <div id="auth-error" class="error-msg hidden"></div>
    </div>

    <!-- Connected Section (shown when logged in) -->
    <div id="connected-section" class="section hidden">
      <div class="connection-badge">
        <span class="dot dot-green"></span>
        <span id="connected-user">Connected</span>
        <button id="btn-logout" class="btn-link">Disconnect</button>
      </div>

      <!-- Leads counter -->
      <div class="leads-counter">
        <div class="counter-number" id="lead-count">0</div>
        <div class="counter-label">Leads Selected</div>
      </div>

      <!-- Selected leads list -->
      <div id="leads-list" class="leads-list"></div>

      <!-- Import button -->
      <button id="btn-import" class="btn btn-success" disabled>
        Import to CRM
      </button>
      <button id="btn-clear" class="btn btn-outline">Clear All</button>
      <div id="import-result" class="result-msg hidden"></div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      NetBots (SMC-Private) Limited
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
