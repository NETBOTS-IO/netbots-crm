<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetBots CRM Scraper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="logo">
        <span class="logo-nb">NB</span>
        <span class="logo-text">NetBots <strong>Scraper</strong></span>
      </div>
      <span class="version">v1.1</span>
    </div>

    <!-- Connected Section (Direct Access) -->
    <div id="connected-section" class="section">
      <!-- Leads counter -->
      <div class="leads-counter">
        <div class="counter-number" id="lead-count">0</div>
        <div class="counter-label">Leads Scraped</div>
      </div>

      <!-- Selected leads list -->
      <div id="leads-list" class="leads-list"></div>

      <!-- Actions -->
      <button id="btn-csv" class="btn btn-primary" disabled>
        Download CSV
      </button>
      
      <button id="btn-import" class="btn btn-success" disabled>
        Import to CRM
      </button>
      
      <button id="btn-clear" class="btn btn-outline">Clear All</button>
      
      <div id="import-result" class="result-msg hidden"></div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      NetBots (SMC-Private) Limited
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
